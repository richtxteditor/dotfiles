name: test

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck zsh tmux neovim lua5.4
          sudo ln -sf /usr/bin/luac5.4 /usr/local/bin/luac

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core shellcheck tmux neovim lua

      - name: Run test suite
        run: ./test.sh

      - name: Smoke install (Ubuntu)
        if: runner.os == 'Linux'
        run: bash ./scripts/ci-smoke-install.sh linux

      - name: Smoke install (macOS)
        if: runner.os == 'macOS'
        run: bash ./scripts/ci-smoke-install.sh macos skip-deps
